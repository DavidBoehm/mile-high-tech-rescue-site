name: Daily Project Tasks

on:
  schedule:
    # Runs at 9 AM UTC every day (adjust as needed)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allows manual trigger

jobs:
  create-daily-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Create daily standup task
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId = "PVT_kwHOApRyAc4BWJtT";  // Your project ID
            const date = new Date().toISOString().split('T')[0];
            
            // Create draft issue in project
            const result = await github.graphql(`
              mutation createDraftIssue($projectId: ID!, $title: String!, $body: String!) {
                addProjectV2DraftIssue(input: {
                  projectId: $projectId,
                  title: $title,
                  body: $body
                }) {
                  projectItem {
                    id
                  }
                }
              }
            `, {
              projectId: projectId,
              title: `Daily Standup - ${date}`,
              body: `- [ ] Review yesterday\n- [ ] Plan today\n- [ ] Blockers?`
            });
            
            console.log(`Created daily task: ${result.addProjectV2DraftIssue.projectItem.id}`);
      
      - name: Create weekly review task (on Mondays)
        if: github.event.schedule == '0 9 * * 1' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId = "PVT_kwHOApRyAc4BWJtT";
            
            await github.graphql(`
              mutation createDraftIssue($projectId: ID!, $title: String!, $body: String!) {
                addProjectV2DraftIssue(input: {
                  projectId: $projectId,
                  title: $title,
                  body: $body
                }) {
                  projectItem {
                    id
                  }
                }
              }
            `, {
              projectId: projectId,
              title: `Weekly Review - Week of ${new Date().toISOString().split('T')[0]}`,
              body: `- [ ] Review weekly goals\n- [ ] Check project milestones\n- [ ] Plan next week priorities`
            });
