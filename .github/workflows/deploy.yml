name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Production
        uses: cloudflare/pages-action@v1
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: mile-high-tech-rescue
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Success
        run: echo "✅ Production deployed to milehightechrescue.com"

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site (Dev)
        run: npm run build
        env:
          NODE_ENV: development
          DEV_PASSWORD: ${{ secrets.DEV_PASSWORD }}

      - name: Deploy to Dev/Staging
        uses: cloudflare/pages-action@v1
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: mile-high-tech-rescue-dev
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Success
        run: echo "✅ Dev deployed to dev.milehightechrescue.com"
