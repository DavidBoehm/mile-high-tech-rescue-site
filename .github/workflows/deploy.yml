name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: mile-high-tech-rescue
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment Preview URL
        if: github.ref == 'refs/heads/dev'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '🚀 **Preview Deployed!**\n\nView changes at: https://dev.milehightechrescue.com'
            })

      - name: Show URLs
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "✅ Production: https://milehightechrescue.com"
          else
            echo "🔨 Preview: Check GitHub commit comments or Cloudflare dashboard for URL"
          fi
